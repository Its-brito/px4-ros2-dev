x-base: &base
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - DISPLAY=${DISPLAY}
    - HOST_UID=${HOST_UID:-1000}
    - HOST_GID=${HOST_GID:-1000}
    - QT_X11_NO_MITSHM=1
  volumes:
    - ../shared_volume:/home/devuser/shared_volume
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
  network_mode: host
  stdin_open: true
  tty: true
  working_dir: /home/devuser/shared_volume
  mem_limit: 6g
  memswap_limit: 6g
  oom_kill_disable: false

services:
  px4-ros2:
    <<: *base
    container_name: px4-ros2-dev
    # devices:
    #   - /dev/dri:/dev/dri

  px4-ros2-gpu:
    <<: *base
    container_name: px4-ros2-dev-gpu
    profiles:
      - gpu
    environment:
      - DISPLAY=${DISPLAY}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
